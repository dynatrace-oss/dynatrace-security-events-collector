###############################################################################
# CI/CD — Dynatrace Security Events Collector
#
# Repository: dynatrace-oss/dynatrace-security-events-collector
#
# This workflow handles:
#   1. Lint & code quality (golangci-lint, go vet)
#   2. Unit tests (both plugins + race detection + coverage)
#   3. Security scanning (govulncheck, Trivy, CodeQL)
#   4. Build each plugin individually (catch compile errors early)
#   5. Build collector binaries for 5 platforms via OCB
#   6. Build multi-arch Docker images (GHCR)
#   7. Generate SBOM (Software Bill of Materials)
#   8. Build & deploy documentation website (MkDocs Material)
#   9. Create GitHub Release with binaries, checksums, and SBOM
#
# TODO: Once the repo is created, verify/update:
#   - REGISTRY / IMAGE_NAME env vars
#   - GitHub Pages: Settings → Pages → Source: GitHub Actions
###############################################################################

name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  OCB_VERSION: "v0.145.0"
  GO_VERSION: "1.25"
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dynatrace-security-events-collector

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write
  actions: read                  # For CodeQL telemetry (workflow-runs API)
  security-events: write         # For CodeQL / Trivy SARIF upload

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ===================================================================
# STAGE 1: Quality gates (run on every push & PR)
# ===================================================================
jobs:

  # ------------------------------------------------------------------
  # Job: Lint & static analysis
  # ------------------------------------------------------------------
  lint:
    name: Lint & code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run go vet (processor)
        working-directory: src/SecurityLogEventProcessor
        run: go vet ./...

      - name: Run go vet (exporter)
        working-directory: src/SecurityEventExporter
        run: go vet ./...

      - name: Run golangci-lint (processor)
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: src/SecurityLogEventProcessor
          args: --timeout=5m

      - name: Run golangci-lint (exporter)
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: src/SecurityEventExporter
          args: --timeout=5m

  # ------------------------------------------------------------------
  # Job: Unit tests with coverage
  # ------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test processor (with race detection)
        working-directory: src/SecurityLogEventProcessor
        run: |
          go test -v -race -coverprofile=coverage-processor.out -covermode=atomic ./...

      - name: Test exporter (with race detection)
        working-directory: src/SecurityEventExporter
        run: |
          go test -v -race -coverprofile=coverage-exporter.out -covermode=atomic ./...

      - name: Upload coverage (processor)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-processor
          path: src/SecurityLogEventProcessor/coverage-processor.out
          retention-days: 7

      - name: Upload coverage (exporter)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-exporter
          path: src/SecurityEventExporter/coverage-exporter.out
          retention-days: 7

  # ------------------------------------------------------------------
  # Job: Security — govulncheck (Go vulnerability scanner)
  # ------------------------------------------------------------------
  govulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan processor
        working-directory: src/SecurityLogEventProcessor
        run: govulncheck ./...

      - name: Scan exporter
        working-directory: src/SecurityEventExporter
        run: govulncheck ./...

  # ------------------------------------------------------------------
  # Job: Security — CodeQL analysis
  # ------------------------------------------------------------------
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

# ===================================================================
# STAGE 2: Build artifacts (after quality gates pass)
# ===================================================================

  # ------------------------------------------------------------------
  # Job: Build each plugin individually (catch compile errors early)
  # ------------------------------------------------------------------
  build-plugins:
    name: Build plugins
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build processor
        working-directory: src/SecurityLogEventProcessor
        run: go build -v ./...

      - name: Build exporter
        working-directory: src/SecurityEventExporter
        run: go build -v ./...

  # ------------------------------------------------------------------
  # Job: Build collector binaries using OCB
  # ------------------------------------------------------------------
  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [build-plugins]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install OCB
        run: |
          go install go.opentelemetry.io/collector/cmd/builder@${{ env.OCB_VERSION }}
          mv $(go env GOPATH)/bin/builder $(go env GOPATH)/bin/ocb

      - name: Build collector binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: ocb --config ocb/manifest.yaml --verbose

      - name: Rename binary with platform suffix
        run: |
          cd dist
          BINARY=$(ls otelcol-securityevents* | head -1)
          SUFFIX="${{ matrix.goos }}_${{ matrix.goarch }}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            mv "${BINARY}" "otelcol-securityevents_${SUFFIX}.exe"
          else
            mv "${BINARY}" "otelcol-securityevents_${SUFFIX}"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: otelcol-securityevents_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/otelcol-securityevents_*
          retention-days: 7

  # ------------------------------------------------------------------
  # Job: Build & push Docker images
  # ------------------------------------------------------------------
  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [build-plugins]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # Job: Security — Trivy image scan
  # ------------------------------------------------------------------
  trivy-scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: build-docker
    continue-on-error: true
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "short_sha=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Pull image
        run: docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

  # ------------------------------------------------------------------
  # Job: Generate SBOM
  # ------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "short_sha=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Pull image
        run: docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX)
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }} \
            -o spdx-json=sbom-spdx.json

      - name: Generate SBOM (CycloneDX)
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }} \
            -o cyclonedx-json=sbom-cyclonedx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 90

# ===================================================================
# STAGE 3: Documentation (independent, runs in parallel)
# ===================================================================

  # ------------------------------------------------------------------
  # Job: Build & deploy documentation
  # ------------------------------------------------------------------
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MkDocs
        run: |
          pip install \
            mkdocs \
            mkdocs-material \
            pymdown-extensions

      - name: Build site
        run: mkdocs build --config-file dynatrace-doc/mkdocs.yml --site-dir ${{ runner.temp }}/site

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

# ===================================================================
# STAGE 4: Release (only on version tags)
# ===================================================================

  # ------------------------------------------------------------------
  # Job: Create GitHub Release
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker, sbom, docs]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Collect binaries
          for dir in artifacts/otelcol-securityevents_*/; do
            cp "${dir}"otelcol-securityevents_* release-assets/ 2>/dev/null || true
          done

          # Collect SBOM files
          if [ -d "artifacts/sbom" ]; then
            cp artifacts/sbom/sbom-*.json release-assets/
          fi

          # Generate SHA256 checksums
          cd release-assets
          sha256sum * > checksums.txt
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*
          body: |
            ## Dynatrace Security Events Collector ${{ github.ref_name }}

            OpenTelemetry Collector distribution with the Security Event Processor and Exporter plugins for ingesting Kyverno policy compliance events into Dynatrace.

            ### Documentation

            [View the documentation](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)

            ### Docker Image

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Collector Binaries

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | amd64 | `otelcol-securityevents_linux_amd64` |
            | Linux | arm64 | `otelcol-securityevents_linux_arm64` |
            | macOS | amd64 (Intel) | `otelcol-securityevents_darwin_amd64` |
            | macOS | arm64 (Apple Silicon) | `otelcol-securityevents_darwin_arm64` |
            | Windows | amd64 | `otelcol-securityevents_windows_amd64.exe` |

            ### Components

            | Component | Version |
            |-----------|---------|
            | OpenTelemetry Collector | v0.145.0 |
            | Security Event Processor | (monorepo) |
            | Security Event Exporter | (monorepo) |

            ### Security & Compliance

            - SBOM files (SPDX + CycloneDX) attached
            - Verify checksums: `sha256sum -c checksums.txt`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
