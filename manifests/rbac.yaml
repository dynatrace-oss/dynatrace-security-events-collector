apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-events-collector
  namespace: dynatrace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otelcontribcol
rules:
  # Prometheus metrics endpoint
  - nonResourceURLs: [ "/metrics" ]
    verbs: [ "get" ]
  # OpenReports CRDs (Kyverno reports-server)
  - apiGroups: [ "openreports.io" ]
    resources: [ "reports", "clusterreports" ]
    verbs: [ "get", "list", "watch" ]
  # Kyverno PolicyReports (wgpolicyk8s.io)
  - apiGroups: [ "wgpolicyk8s.io" ]
    resources: [ "policyreports", "clusterpolicyreports" ]
    verbs: [ "get", "list", "watch" ]


  - apiGroups:
      - ""
    resources:
      - events
      - namespaces
      - namespaces/status
      - nodes
      - nodes/spec
      - nodes/stats
      - nodes/proxy
      - pods
      - pods/status
      - replicationcontrollers
      - replicationcontrollers/status
      - resourcequotas
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - "events.k8s.io"
    resources:
      - events
    verbs:
      - watch
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions
    resources:
      - daemonsets
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otelcontribcol
  labels:
    app: otelcontribcol
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otelcontribcol
subjects:
  - kind: ServiceAccount
    name: security-events-collector
    namespace: dynatrace