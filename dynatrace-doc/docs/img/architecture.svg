<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1496FF"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Kyverno → Dynatrace Security Events — Architecture</text>

  <!-- ==================== KUBERNETES CLUSTER BOX ==================== -->
  <rect x="20" y="50" width="640" height="450" rx="12" fill="none" stroke="#d1d9e0" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="40" y="74" font-size="12" font-weight="600" fill="#6c757d">KUBERNETES CLUSTER</text>

  <!-- Kyverno box -->
  <rect x="50" y="95" width="200" height="170" rx="8" fill="#fff" stroke="#6F42C1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="95" width="200" height="32" rx="8" fill="#6F42C1"/>
  <rect x="50" y="115" width="200" height="12" fill="#6F42C1"/>
  <text x="150" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Kyverno</text>

  <!-- Kyverno sub-items -->
  <text x="70" y="150" font-size="10" fill="#1a1a2e">📋 ClusterValidatingPolicy</text>
  <text x="70" y="168" font-size="10" fill="#1a1a2e">📋 ValidatingPolicy</text>
  <text x="70" y="186" font-size="10" fill="#1a1a2e">📋 ImageValidatingPolicy</text>
  <text x="70" y="204" font-size="10" fill="#1a1a2e">📋 ClusterPolicy (legacy)</text>

  <text x="150" y="240" text-anchor="middle" font-size="9" fill="#6c757d">evaluates resources →</text>
  <text x="150" y="252" text-anchor="middle" font-size="9" fill="#6c757d">produces OpenReports</text>

  <!-- OpenReports box -->
  <rect x="50" y="280" width="200" height="80" rx="8" fill="#fff" stroke="#28A745" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="280" width="200" height="28" rx="8" fill="#28A745"/>
  <rect x="50" y="298" width="200" height="10" fill="#28A745"/>
  <text x="150" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">OpenReports CRs</text>
  <text x="150" y="325" text-anchor="middle" font-size="10" fill="#1a1a2e">reports.openreports.io</text>
  <text x="150" y="342" text-anchor="middle" font-size="10" fill="#1a1a2e">clusterreports.openreports.io</text>

  <!-- Arrow: Kyverno → OpenReports -->
  <line x1="150" y1="265" x2="150" y2="278" stroke="#1496FF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== OTel Collector BOX ==================== -->
  <rect x="290" y="95" width="350" height="375" rx="8" fill="#fff" stroke="#1496FF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="290" y="95" width="350" height="32" rx="8" fill="#1496FF"/>
  <rect x="290" y="115" width="350" height="12" fill="#1496FF"/>
  <text x="465" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">OpenTelemetry Collector</text>
  <text x="465" y="146" text-anchor="middle" font-size="9" fill="#6c757d">dynatrace-oss/dynatrace-security-events-collector:0.22</text>

  <!-- Receiver -->
  <rect x="310" y="160" width="310" height="50" rx="6" fill="#e8f4fd" stroke="#1496FF" stroke-width="1"/>
  <text x="320" y="178" font-size="9" font-weight="600" fill="#0077cc">RECEIVER</text>
  <text x="320" y="198" font-size="10" fill="#1a1a2e">k8sobjects — pull reports + clusterreports every 10m</text>

  <!-- Processors -->
  <rect x="310" y="222" width="310" height="110" rx="6" fill="#f3e8fd" stroke="#6F42C1" stroke-width="1"/>
  <text x="320" y="240" font-size="9" font-weight="600" fill="#6F42C1">PROCESSORS</text>
  <text x="320" y="258" font-size="10" fill="#1a1a2e">① memory_limiter</text>
  <text x="320" y="274" font-size="10" fill="#1a1a2e">② resource (cluster name)</text>
  <text x="320" y="290" font-size="10" font-weight="600" fill="#1a1a2e">③ securityevent (transform OpenReports)</text>
  <text x="320" y="306" font-size="10" fill="#1a1a2e">④ k8sattributes/security (cluster UID)</text>
  <text x="320" y="322" font-size="10" fill="#1a1a2e">⑤ batch</text>

  <!-- Exporter -->
  <rect x="310" y="344" width="310" height="50" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="320" y="362" font-size="9" font-weight="600" fill="#e65100">EXPORTER</text>
  <text x="320" y="382" font-size="10" font-weight="600" fill="#1a1a2e">securityevent → POST /platform/ingest/v1/security.events</text>

  <!-- Arrow: Receiver → Processors -->
  <line x1="465" y1="210" x2="465" y2="220" stroke="#1496FF" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow: Processors → Exporter -->
  <line x1="465" y1="332" x2="465" y2="342" stroke="#1496FF" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow: OpenReports → Collector Receiver -->
  <line x1="250" y1="320" x2="285" y2="320" stroke="#1496FF" stroke-width="1.5"/>
  <line x1="285" y1="320" x2="285" y2="185" stroke="#1496FF" stroke-width="1.5"/>
  <line x1="285" y1="185" x2="308" y2="185" stroke="#1496FF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== DYNATRACE BOX ==================== -->
  <rect x="700" y="95" width="240" height="375" rx="8" fill="#fff" stroke="#1496FF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="700" y="95" width="240" height="32" rx="8" fill="#1a1a2e"/>
  <rect x="700" y="115" width="240" height="12" fill="#1a1a2e"/>
  <text x="820" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Dynatrace</text>

  <!-- Security Events API -->
  <rect x="720" y="150" width="200" height="50" rx="6" fill="#e8f4fd" stroke="#1496FF" stroke-width="1"/>
  <text x="820" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#0077cc">Security Events API</text>
  <text x="820" y="188" text-anchor="middle" font-size="9" fill="#1a1a2e">/platform/ingest/v1/security.events</text>

  <!-- Grail -->
  <rect x="720" y="220" width="200" height="40" rx="6" fill="#e8f5e9" stroke="#28A745" stroke-width="1"/>
  <text x="820" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Grail (security_events)</text>

  <!-- Dashboards -->
  <rect x="720" y="280" width="200" height="35" rx="6" fill="#f5f7fa" stroke="#d1d9e0" stroke-width="1"/>
  <text x="820" y="302" text-anchor="middle" font-size="10" fill="#1a1a2e">Dashboards</text>

  <!-- Notebooks -->
  <rect x="720" y="325" width="200" height="35" rx="6" fill="#f5f7fa" stroke="#d1d9e0" stroke-width="1"/>
  <text x="820" y="347" text-anchor="middle" font-size="10" fill="#1a1a2e">Notebooks &amp; Investigations</text>

  <!-- Workflows -->
  <rect x="720" y="370" width="200" height="35" rx="6" fill="#f5f7fa" stroke="#d1d9e0" stroke-width="1"/>
  <text x="820" y="392" text-anchor="middle" font-size="10" fill="#1a1a2e">Workflows (Automation)</text>

  <!-- Security section -->
  <rect x="720" y="415" width="200" height="35" rx="6" fill="#f5f7fa" stroke="#d1d9e0" stroke-width="1"/>
  <text x="820" y="437" text-anchor="middle" font-size="10" fill="#1a1a2e">Security Section</text>

  <!-- Arrow: Collector → DT API -->
  <line x1="640" y1="369" x2="672" y2="369" stroke="#1496FF" stroke-width="1.5"/>
  <line x1="672" y1="369" x2="672" y2="175" stroke="#1496FF" stroke-width="1.5"/>
  <line x1="672" y1="175" x2="718" y2="175" stroke="#1496FF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: API → Grail -->
  <line x1="820" y1="200" x2="820" y2="218" stroke="#1496FF" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrows: Grail → consumers -->
  <line x1="820" y1="260" x2="820" y2="278" stroke="#d1d9e0" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="820" y1="315" x2="820" y2="323" stroke="#d1d9e0" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="820" y1="360" x2="820" y2="368" stroke="#d1d9e0" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="820" y1="405" x2="820" y2="413" stroke="#d1d9e0" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step numbers -->
  <circle cx="150" cy="270" r="9" fill="#1496FF"/>
  <text x="150" y="273" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">1</text>

  <circle cx="278" cy="185" r="9" fill="#1496FF"/>
  <text x="278" y="188" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">2</text>

  <circle cx="302" cy="290" r="9" fill="#1496FF"/>
  <text x="302" y="293" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">3</text>

  <circle cx="302" cy="369" r="9" fill="#1496FF"/>
  <text x="302" y="372" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">4</text>

  <circle cx="665" cy="175" r="9" fill="#1496FF"/>
  <text x="665" y="178" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">5</text>

  <circle cx="820" cy="210" r="9" fill="#1496FF"/>
  <text x="820" y="213" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">6</text>

  <!-- Legend -->
  <text x="40" y="488" font-size="9" fill="#6c757d">① Kyverno produces OpenReports  ② Collector pulls reports  ③ Processor transforms to security events  ④ Exporter sends to DT  ⑤ API ingests  ⑥ Grail stores</text>
</svg>
